version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/support_ticket_db
      - JWT_SECRET=replace_me
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - '3000:80'

  mongo:
    image: mongo:6.0
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
